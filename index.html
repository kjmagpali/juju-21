<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hbd juju</title>
    <style>
        /* Reset spacing defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        /* Locks the screen and prevents any scrolling */
        body {
            background-color: #111111; 
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* The viewport-locked 9:16 container */
        .invite-container {
            position: relative;
            height: 100%; 
            max-height: 100dvh;
            aspect-ratio: 9 / 16; 
            background-color: #4a0000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Makes the image fit the exact frame perfectly */
        .invite-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Fully transparent form wrapper pinned to the bottom */
        .rsvp-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            background: transparent; 
        }

        .input-group {
            margin-bottom: 15px;
        }

        /* Text box with a subtle tint so it remains readable over your design */
        input[type="text"] {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.3); /* Slightly darker tint for better contrast */
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ffffff;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Custom styled button to complement a dark red background */
        button {
            width: 100%;
            padding: 15px;
            background-color: #ffffff;
            color: #4a0000; 
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="invite-container">
        <img src="juju21.jpg" alt="Birthday Invitation">

        <div class="rsvp-overlay">
            <form action="https://formspree.io/f/xgojjpbk" method="POST">
                
                <div class="input-group">
                    <input type="text" id="guest-name" name="Guest Name" required placeholder="Enter name to confirm...">
                </div>

                <button type="submit">Send RSVP</button>
            </form>
        </div>
    </div>

</body>
</html>
